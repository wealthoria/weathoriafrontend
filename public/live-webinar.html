<div style="max-width:1200px;margin:auto;display:flex;gap:20px;flex-wrap:wrap;">

    <!-- Live Player -->
    <div style="flex:2;min-width:600px;">
        <iframe
            id="livePlayer"
            style="border:0;width:100%;aspect-ratio:16/9;"
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>
    </div>

    <!-- Live Chat -->
    <div style="flex:1;min-width:320px;">
        <iframe
            id="liveChat"
            style="border:0;width:100%;height:600px;"
            allowfullscreen>
        </iframe>
    </div>

</div>

<script>
async function loadLive() {
    try {

        const response = await fetch(
            "https://webinar-registration-backend.onrender.com/api/live/token"
        );

        const data = await response.json();

        if (!data.success) {
            alert("Failed to generate JWT token");
            return;
        }

        const token = data.token;
        const liveId = "73f4ba1e7cd046fe9bc579397277a7ca";

        // Load Player
        document.getElementById("livePlayer").src =
            `https://player.vdocipher.com/live-v2?liveId=${liveId}&token=${token}`;

        // Load Chat
        document.getElementById("liveChat").src =
            `https://zenstream.chat?liveId=${liveId}&token=${token}`;

    } catch (err) {
        console.error(err);
        alert("Unable to load live stream.");
    }
}

// Load immediately
loadLive();
</script>
