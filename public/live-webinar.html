<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealthoria Live Webinar</title>
</head>
<body>

<h1>🔴 Wealthoria Live Webinar</h1>

<div id="player">
    Loading webinar...
</div>

<script>
async function loadWebinar() {
    try {

        const response = await fetch("http://localhost:10000/api/live/token");

        const data = await response.json();

        console.log(data);

        document.getElementById("player").innerHTML =
            "<pre>" + JSON.stringify(data, null, 2) + "</pre>";

    } catch (err) {
        console.error(err);
        document.getElementById("player").innerHTML =
            "<h2>Unable to load webinar.</h2>";
    }
}

loadWebinar();
</script>

</body>
</html>
