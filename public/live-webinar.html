<style>
.login-container{
    max-width:450px;
    margin:40px auto;
    padding:25px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    text-align:center;
}

.login-container input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

.login-container button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

#message{
    color:red;
    margin-top:10px;
}

.webinar-container{
    max-width:1200px;
    margin:auto;
    display:none;
    gap:20px;
    flex-wrap:wrap;
}

.player{
    flex:2;
    min-width:600px;
}

.chat{
    flex:1;
    min-width:320px;
}

.player iframe{
    width:100%;
    aspect-ratio:16/9;
    border:0;
}

.chat iframe{
    width:100%;
    height:600px;
    border:0;
}

@media(max-width:768px){

.webinar-container{
    flex-direction:column;
    padding:10px;
}

.player,
.chat{
    min-width:100%;
}

.chat iframe{
    height:500px;
}

.login-container{
    margin:20px;
}

}
</style>

<!-- Login -->
<div id="loginSection" class="login-container">

<h2>Join Wealthoria Live Webinar</h2>

<input
type="email"
id="email"
placeholder="Enter your registered email">

<button onclick="joinWebinar()">
Join Webinar
</button>

<p id="message"></p>

</div>

<!-- Webinar -->
<div id="webinarSection" class="webinar-container">

<div class="player">
<iframe
id="livePlayer"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>
</div>

<div class="chat">
<iframe
id="liveChat"
allowfullscreen>
</iframe>
</div>

</div>

<script>

async function joinWebinar(){

const email=document.getElementById("email").value.trim();

if(email===""){
document.getElementById("message").innerHTML="Please enter your registered email.";
return;
}

try{

const response=await fetch(
`https://webinar-registration-backend.onrender.com/api/live/token?email=${encodeURIComponent(email)}`
);

const data=await response.json();

if(!data.success){
document.getElementById("message").innerHTML=data.message;
return;
}

document.getElementById("loginSection").style.display="none";
document.getElementById("webinarSection").style.display="flex";

const token=data.token;

const liveId="73f4ba1e7cd046fe9bc579397277a7ca";

document.getElementById("livePlayer").src=
`https://player.vdocipher.com/live-v2?liveId=${liveId}&token=${token}`;

document.getElementById("liveChat").src=
`https://zenstream.chat?liveId=${liveId}&token=${token}`;

}catch(err){
console.error(err);
document.getElementById("message").innerHTML="Unable to join webinar.";
}

}

</script>
