<style>
.login-container{
    max-width:450px;
    margin:40px auto;
    padding:25px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    text-align:center;
}
.login-container input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

.login-container button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

#message{
    color:red;
    margin-top:10px;
}

.webinar-container{
    width:100%;
    max-width:100%;
    margin:auto;
    display:none;
    gap:20px;
    flex-wrap:wrap;
    padding:20px;
    box-sizing:border-box;
}

.player{
    flex:3;
    min-width:0;
}

.chat{
    flex:1;
    min-width:320px;
    max-width:380px;
}

.player iframe{
    width:100%;
    aspect-ratio:16/9;
    border:0;
    border-radius:10px;
}

.chat iframe{
    width:100%;
    height:600px;
    border:0;
    border-radius:10px;
}

@media(max-width:768px){

.webinar-container{
    flex-direction:column;
    padding:10px;
}

.player,
.chat{
    min-width:100%;
    max-width:100%;
}

.chat iframe{
    height:450px;
}

.login-container{
    margin:20px;
}

}
</style>

<!-- Login -->
<div id="loginSection" class="login-container">

<h2>Join Wealthoria Live Webinar</h2>

<input
type="email"
id="email"
placeholder="Enter your registered email">

<button onclick="joinWebinar()">
Join Webinar
</button>

<p id="message"></p>

</div>

<!-- Webinar -->


<!-- ========================= -->
<!-- ADMIN SCHEDULE SCREEN -->
<!-- ========================= -->

<div id="adminScheduleSection" class="login-container" style="display:none;">

    <h2>Wealthoria Webinar</h2>

    <div style="
        text-align:left;
        background:#f8fafc;
        padding:20px;
        border-radius:10px;
        margin:20px 0;
        line-height:1.8;
    ">

        <p>
            <strong>Status:</strong>
            <span style="color:#16a34a;">Scheduled</span>
        </p>

        <p><strong>Created at:</strong> 23-Jul-2026, 14:44</p>
<p>
    <strong>Scheduled for:</strong>
    23-Jul-2026, 6:55 PM
</p>

<div style="
    margin:20px 0;
    padding:15px;
    background:#eff6ff;
    border-radius:8px;
    text-align:center;
">
    <div style="font-weight:bold;margin-bottom:5px;">
        Webinar Starts In
    </div>

    <div id="webinarCountdown"
         style="font-size:24px;font-weight:bold;color:#2563eb;">
        Calculating...
    </div>
</div>

<p><strong>Chat:</strong> Authenticated</p>

    </div>

    <button onclick="startAdminWebinar()"
            style="background:#16a34a;">
        Start Webinar
    </button>

</div>
<!-- Webinar -->



<!-- Webinar -->
<div id="webinarSection" class="webinar-container">

    <div style="width:100%;display:flex;justify-content:flex-end;margin-bottom:15px;">
        <button
            onclick="logoutWebinar()"
            style="
                background:#dc2626;
                color:#fff;
                border:none;
                padding:10px 18px;
                border-radius:6px;
                cursor:pointer;
                font-size:15px;">
            Leave Webinar
        </button>
    </div>

    <div class="player">
        <iframe
            id="livePlayer"
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>
    </div>

    <div class="chat">
        <iframe
            id="liveChat"
            allowfullscreen>
        </iframe>
    </div>

</div>

<script>
async function joinWebinar() {

    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message");

    // Webinar time: 23 July 2026, 6:55 PM IST
    const webinarTime = new Date("2026-07-23T18:55:00+05:30");

    // Users can join 30 minutes before
    const joinOpenTime = new Date(
        webinarTime.getTime() - (30 * 60 * 1000)
    );

    const now = new Date();

    // BLOCK USER BEFORE 6:25 PM
    if (now < joinOpenTime) {

        message.style.color = "#d97706";
        message.innerHTML =
            "Webinar joining will open 30 minutes before the scheduled time (6:25 PM).";

        return;
    }

    // Validate email
    if (email === "") {

        message.style.color = "red";
        message.innerHTML =
            "Please enter your registered email.";

        return;
    }

    try {

        const response = await fetch(
            `https://webinar-registration-backend.onrender.com/api/live/token?email=${encodeURIComponent(email)}`
        );

        const data = await response.json();

        if (!data.success) {

            message.style.color = "red";
            message.innerHTML = data.message;

            return;
        }

        localStorage.setItem("webinarEmail", email);

        document.getElementById("loginSection").style.display = "none";
        document.getElementById("webinarSection").style.display = "flex";

        const token = data.token;

        const liveId = "368fd8f7617446e392ccf84277e15e82";

        document.getElementById("livePlayer").src =
            `https://player.vdocipher.com/live-v2?liveId=${liveId}&token=${token}`;

        document.getElementById("liveChat").src =
            `https://zenstream.chat?liveId=${liveId}&token=${token}`;

    } catch (err) {

        console.error(err);

        message.style.color = "red";
        message.innerHTML =
            "Unable to join webinar.";
    }
}



window.onload = async function () {

    const params = new URLSearchParams(window.location.search);
    const adminToken = params.get("adminToken");

    // ADMIN LOGIN
    if (adminToken) {

        try {

            const response = await fetch(
                `https://webinar-registration-backend.onrender.com/api/live/token?adminToken=${encodeURIComponent(adminToken)}`
            );

            const data = await response.json();

            if (!data.success) {
                document.getElementById("message").innerHTML =
                    data.message || "Invalid admin access.";
                return;
            }

            // Save admin VdoCipher token
            sessionStorage.setItem("adminLiveToken", data.token);

            // Hide login
            document.getElementById("loginSection").style.display = "none";

            // Hide video initially
            document.getElementById("webinarSection").style.display = "none";

            // SHOW SCHEDULE
            document.getElementById("adminScheduleSection").style.display = "block";

        } catch (error) {

            console.error(error);

            document.getElementById("message").innerHTML =
                "Unable to verify admin.";

        }

        return;
    }


    // NORMAL USER AUTO LOGIN
    const savedEmail = localStorage.getItem("webinarEmail");

    if (savedEmail) {

        document.getElementById("email").value = savedEmail;

        joinWebinar();
    }

};


// Webinar scheduled for 23 July 2026, 6:55 PM India time
const webinarStartTime = new Date("2026-07-23T18:55:00+05:30");

function updateWebinarCountdown() {

    const countdown = document.getElementById("webinarCountdown");

    if (!countdown) return;

    const now = new Date();
    const difference = webinarStartTime - now;

    if (difference <= 0) {

        countdown.innerHTML = "Webinar is ready to start";
        return;
    }

    const days = Math.floor(difference / (1000 * 60 * 60 * 24));

    const hours = Math.floor(
        (difference / (1000 * 60 * 60)) % 24
    );

    const minutes = Math.floor(
        (difference / (1000 * 60)) % 60
    );

    const seconds = Math.floor(
        (difference / 1000) % 60
    );

    countdown.innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

updateWebinarCountdown();

setInterval(updateWebinarCountdown, 1000);

function startAdminWebinar() {

    const token = sessionStorage.getItem("adminLiveToken");

    if (!token) {
        alert("Admin session expired.");
        return;
    }

    const liveId = "368fd8f7617446e392ccf84277e15e82";

    // Hide schedule
    document.getElementById("adminScheduleSection").style.display = "none";

    // Show webinar
    document.getElementById("webinarSection").style.display = "flex";

    // Load video
    document.getElementById("livePlayer").src =
        `https://player.vdocipher.com/live-v2?liveId=${liveId}&token=${token}`;

    // Load chat
    document.getElementById("liveChat").src =
        `https://zenstream.chat?liveId=${liveId}&token=${token}`;
}

function logoutWebinar(){

    localStorage.removeItem("webinarEmail");

    document.getElementById("livePlayer").src="";
    document.getElementById("liveChat").src="";

    document.getElementById("webinarSection").style.display="none";
    document.getElementById("loginSection").style.display="block";

    document.getElementById("email").value="";
    document.getElementById("message").innerHTML="";
}

</script>
