<style>
.login-container{
    max-width:450px;
    margin:40px auto;
    padding:25px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    text-align:center;
}
.login-container input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

.login-container button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

#message{
    color:red;
    margin-top:10px;
}

.webinar-container{
    width:100%;
    max-width:100%;
    margin:auto;
    display:none;
    gap:20px;
    flex-wrap:wrap;
    padding:20px;
    box-sizing:border-box;
}

.player{
    flex:3;
    min-width:0;
}

.chat{
    flex:1;
    min-width:320px;
    max-width:380px;
}

.player iframe{
    width:100%;
    aspect-ratio:16/9;
    border:0;
    border-radius:10px;
}

.chat iframe{
    width:100%;
    height:600px;
    border:0;
    border-radius:10px;
}

@media(max-width:768px){

.webinar-container{
    flex-direction:column;
    padding:10px;
}

.player,
.chat{
    min-width:100%;
    max-width:100%;
}

.chat iframe{
    height:450px;
}

.login-container{
    margin:20px;
}

}
</style>

<!-- Login -->
<div id="loginSection" class="login-container">

<h2>Join Wealthoria Live Webinar</h2>

<input
type="email"
id="email"
placeholder="Enter your registered email">

<button onclick="joinWebinar()">
Join Webinar
</button>

<p id="message"></p>

</div>

<!-- Webinar -->
<!-- Webinar -->
<div id="webinarSection" class="webinar-container">

    <div style="width:100%;display:flex;justify-content:flex-end;margin-bottom:15px;">
        <button
            onclick="logoutWebinar()"
            style="
                background:#dc2626;
                color:#fff;
                border:none;
                padding:10px 18px;
                border-radius:6px;
                cursor:pointer;
                font-size:15px;">
            Leave Webinar
        </button>
    </div>

    <div class="player">
        <iframe
            id="livePlayer"
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>
    </div>

    <div class="chat">
        <iframe
            id="liveChat"
            allowfullscreen>
        </iframe>
    </div>

</div>

<script>

async function joinWebinar(){

const email=document.getElementById("email").value.trim();

if(email===""){
document.getElementById("message").innerHTML="Please enter your registered email.";
return;
}

try{

const response=await fetch(
`https://webinar-registration-backend.onrender.com/api/live/token?email=${encodeURIComponent(email)}`
);

const data=await response.json();

if(!data.success){
document.getElementById("message").innerHTML=data.message;
return;
}
localStorage.setItem("webinarEmail", email);
document.getElementById("loginSection").style.display="none";
document.getElementById("webinarSection").style.display="flex";

const token=data.token;

const liveId="64c95cd19265461ba318d13836a225c6";

document.getElementById("livePlayer").src=
`https://player.vdocipher.com/live-v2?liveId=${liveId}&token=${token}`;

document.getElementById("liveChat").src=
`https://zenstream.chat?liveId=${liveId}&token=${token}`;

}catch(err){
console.error(err);
document.getElementById("message").innerHTML="Unable to join webinar.";
}
}
window.onload = async function () {

    const params = new URLSearchParams(window.location.search);
    const adminToken = params.get("adminToken");

    // Admin Login
    if (adminToken) {

        const response = await fetch(
            `https://webinar-registration-backend.onrender.com/api/live/token?adminToken=${encodeURIComponent(adminToken)}`
        );

        const data = await response.json();

        if (data.success) {
            localStorage.removeItem("webinarEmail");

            document.getElementById("loginSection").style.display = "none";
            document.getElementById("webinarSection").style.display = "flex";

            const liveId = "73f4ba1e7cd046fe9bc579397277a7ca";

            document.getElementById("livePlayer").src =
            `https://player.vdocipher.com/live-v2?liveId=${liveId}&token=${data.token}`;

            document.getElementById("liveChat").src =
            `https://zenstream.chat?liveId=${liveId}&token=${data.token}`;
        }

        return;
    }

    // Auto Login User
    const savedEmail = localStorage.getItem("webinarEmail");

    if(savedEmail){

        document.getElementById("email").value = savedEmail;

        joinWebinar();

    }

};
function logoutWebinar(){

    localStorage.removeItem("webinarEmail");

    document.getElementById("livePlayer").src="";
    document.getElementById("liveChat").src="";

    document.getElementById("webinarSection").style.display="none";
    document.getElementById("loginSection").style.display="block";

    document.getElementById("email").value="";
    document.getElementById("message").innerHTML="";
}

</script>
