<div style="max-width:1000px;margin:auto;">
  <!-- Live Player -->
  <iframe
    id="livePlayer"
    style="border:0;width:100%;aspect-ratio:16/9;"
    allow="autoplay; fullscreen"
    allowfullscreen>
  </iframe>

  <!-- Chat -->
  <iframe
    id="liveChat"
    style="border:0;width:100%;height:600px;margin-top:20px;">
  </iframe>
</div>

<script>
async function loadLive() {
    try {
        const response = await fetch("https://webinar-registration-backend.onrender.com/api/live/token");
        const data = await response.json();

        if (!data.success) {
            throw new Error("Token generation failed");
        }

        const token = data.token;
        const liveId = "8c3fa815c4e04cefbd72b0e07b883675";

        document.getElementById("livePlayer").src =
            `https://player.vdocipher.com/live-v2?liveId=${liveId}&token=${token}`;

        document.getElementById("liveChat").src =
            `https://zenstream.chat?liveId=${liveId}&token=${token}`;
    } catch (err) {
        console.error("Error loading live stream:", err);
    }
}

loadLive();
</script>
