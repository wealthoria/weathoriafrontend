<div id="countdownContainer" style="text-align:center;padding:40px;">
    <h2>🎓 Wealthoria Live Investment Webinar</h2>
    <h3>The webinar will begin in</h3>

    <div id="countdown"
         style="font-size:40px;font-weight:bold;color:#0d6efd;margin:20px 0;">
    </div>

    <p>Please keep this page open. The live stream will start automatically.</p>
</div>

<div id="liveContainer" style="display:none;max-width:1000px;margin:auto;">
    <!-- Live Player -->
    <iframe
        id="livePlayer"
        style="border:0;width:100%;aspect-ratio:16/9;"
        allow="autoplay; fullscreen">
    </iframe>

    <!-- Chat -->
    <iframe
        id="liveChat"
        style="border:0;width:100%;height:600px;margin-top:20px;">
    </iframe>
</div>
<script>
const webinarStart = new Date("2026-07-18T19:00:00+05:30");

function showLive() {
    document.getElementById("countdownContainer").style.display = "none";
    document.getElementById("liveContainer").style.display = "block";
    loadLive();
}

function startCountdown() {

    // If webinar has already started
    if (new Date() >= webinarStart) {
        showLive();
        return;
    }

    const timer = setInterval(() => {

        const now = new Date();
        const diff = webinarStart - now;

        if (diff <= 0) {
            clearInterval(timer);
            showLive();
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("countdown").innerHTML =
            `${days}d ${hours}h ${minutes}m ${seconds}s`;

    }, 1000);
}

async function loadLive() {
    try {
        const response = await fetch(
            "https://webinar-registration-backend.onrender.com/api/live/token"
        );

        const data = await response.json();

        if (!data.success) {
            throw new Error("Token generation failed");
        }

        const token = data.token;
        const liveId = "e637ad13652d424cb41828eeb755234a";

        document.getElementById("livePlayer").src =
            `https://player.vdocipher.com/live-v2?liveId=${liveId}&token=${token}`;

        document.getElementById("liveChat").src =
            `https://zenstream.chat?liveId=${liveId}&token=${token}`;

    } catch (err) {
        console.error("Live loading failed:", err);
    }
}

startCountdown();
</script>
