<style>
.login-container{
    max-width:450px;
    margin:40px auto;
    padding:25px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    text-align:center;
}
.login-container input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

.login-container button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

#message{
    color:red;
    margin-top:10px;
}

.webinar-container{
    width:100%;
    max-width:100%;
    margin:auto;
    display:none;
    gap:20px;
    flex-wrap:wrap;
    padding:20px;
    box-sizing:border-box;
}

.player{
    flex:3;
    min-width:0;
}

.chat{
    flex:1;
    min-width:320px;
    max-width:380px;
}

.player iframe{
    width:100%;
    aspect-ratio:16/9;
    border:0;
    border-radius:10px;
}

.chat iframe{
    width:100%;
    height:600px;
    border:0;
    border-radius:10px;
}

@media(max-width:768px){

.webinar-container{
    flex-direction:column;
    padding:10px;
}

.player,
.chat{
    min-width:100%;
    max-width:100%;
}

.chat iframe{
    height:450px;
}

.login-container{
    margin:20px;
}

}
</style>

<!-- Login -->
<div id="loginSection" class="login-container">

    <h2>Join Wealthoria Live Webinar</h2>

    <div style="
        background:#f8fafc;
        padding:15px;
        border-radius:8px;
        margin:15px 0;
        line-height:1.8;
    ">

        <p>
            <strong>Created at:</strong>
            23-Jul-2026, 14:44
        </p>

        <p>
            <strong>Scheduled for:</strong>
            23-Jul-2026, 18:55
        </p>

        <div style="
            background:#eff6ff;
            padding:15px;
            border-radius:8px;
            margin-top:15px;
        ">

            <strong>Webinar Starts In</strong>

            <div id="webinarCountdown"
                 style="
                    font-size:24px;
                    font-weight:bold;
                    color:#2563eb;
                    margin-top:8px;
                 ">
                Calculating...
            </div>

        </div>

    </div>

    <p id="joinInfo">
        Joining opens 30 minutes before the webinar.
    </p>

    <!-- HIDDEN UNTIL 6:25 PM -->
    <div id="joinForm" style="display:none;">

        <input
            type="email"
            id="email"
            placeholder="Enter your registered email">

        <button onclick="joinWebinar()">
            Join Webinar
        </button>

    </div>

    <p id="message"></p>

</div>
<!-- Webinar -->
<!-- Webinar -->
<div id="webinarSection" class="webinar-container">

    <div style="width:100%;display:flex;justify-content:flex-end;margin-bottom:15px;">
        <button
            onclick="logoutWebinar()"
            style="
                background:#dc2626;
                color:#fff;
                border:none;
                padding:10px 18px;
                border-radius:6px;
                cursor:pointer;
                font-size:15px;">
            Leave Webinar
        </button>
    </div>

    <div class="player">
        <iframe
            id="livePlayer"
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>
    </div>

    <div class="chat">
        <iframe
            id="liveChat"
            allowfullscreen>
        </iframe>
    </div>

</div>

<script>
async function joinWebinar() {

    const message = document.getElementById("message");

    // Webinar: 23 July 2026, 6:55 PM IST
    const webinarTime = new Date("2026-07-23T18:55:00+05:30");

    // Joining allowed from 6:25 PM
    const joinOpenTime =
        new Date(webinarTime.getTime() - (30 * 60 * 1000));

    const now = new Date();

    // IMPORTANT: BLOCK BEFORE 6:25 PM
    if (now < joinOpenTime) {

        // Make sure webinar cannot appear
        document.getElementById("webinarSection").style.display = "none";
        document.getElementById("loginSection").style.display = "block";

        localStorage.removeItem("webinarEmail");

        message.innerHTML =
            "Joining opens 30 minutes before the webinar.";

        return;
    }


    // From here joining is allowed

    const email =
        document.getElementById("email").value.trim();

    if (email === "") {

        message.innerHTML =
            "Please enter your registered email.";

        return;
    }

    try {

        const response = await fetch(
            `https://webinar-registration-backend.onrender.com/api/live/token?email=${encodeURIComponent(email)}`
        );

        const data = await response.json();

        if (!data.success) {

            message.innerHTML = data.message;

            return;
        }

        // CHECK TIME AGAIN after backend request
        // Prevent delayed request from opening webinar
        if (new Date() < joinOpenTime) {

            document.getElementById("webinarSection").style.display = "none";
            document.getElementById("loginSection").style.display = "block";

            message.innerHTML =
                "Joining opens 30 minutes before the webinar.";

            return;
        }

        document.getElementById("loginSection").style.display = "none";

        document.getElementById("webinarSection").style.display = "flex";

        const token = data.token;

        const liveId =
            "368fd8f7617446e392ccf84277e15e82";

        document.getElementById("livePlayer").src =
            `https://player.vdocipher.com/live-v2?liveId=${liveId}&token=${token}`;

        document.getElementById("liveChat").src =
            `https://zenstream.chat?liveId=${liveId}&token=${token}`;

    } catch (err) {

        console.error(err);

        message.innerHTML =
            "Unable to join webinar.";
    }
}
window.onload = async function () {

    const params = new URLSearchParams(window.location.search);
    const adminToken = params.get("adminToken");

    // Admin Login
    if (adminToken) {

        const response = await fetch(
            `https://webinar-registration-backend.onrender.com/api/live/token?adminToken=${encodeURIComponent(adminToken)}`
        );

        const data = await response.json();

        if (data.success) {

            localStorage.removeItem("webinarEmail");

            document.getElementById("loginSection").style.display = "none";
            document.getElementById("webinarSection").style.display = "flex";

            const liveId = "368fd8f7617446e392ccf84277e15e82";

            document.getElementById("livePlayer").src =
                `https://player.vdocipher.com/live-v2?liveId=${liveId}&token=${data.token}`;

            document.getElementById("liveChat").src =
                `https://zenstream.chat?liveId=${liveId}&token=${data.token}`;
        }

        return;
    }

    // NO USER AUTO LOGIN HERE
};
const webinarStartTime =
    new Date("2026-07-23T18:55:00+05:30");
function updateCountdown() {

    const countdown = document.getElementById("webinarCountdown");
    const joinForm = document.getElementById("joinForm");
    const joinInfo = document.getElementById("joinInfo");

    if (!countdown) return;

    const now = new Date();

    const webinarStartTime =
        new Date("2026-07-23T18:55:00+05:30");

    // Joining opens 30 minutes before webinar
    const joinOpenTime =
        new Date(webinarStartTime.getTime() - (30 * 60 * 1000));

    const difference =
        webinarStartTime.getTime() - now.getTime();


    // ==============================
    // OPEN EMAIL FORM AT 6:25 PM
    // ==============================

    if (now >= joinOpenTime) {

        joinForm.style.display = "block";

        joinInfo.innerHTML =
            "Joining is now open.";

    } else {

        joinForm.style.display = "none";

        joinInfo.innerHTML =
            "Joining opens 30 minutes before the webinar.";
    }


    // ==============================
    // WEBINAR STARTED
    // ==============================

    if (difference <= 0) {

        countdown.innerHTML =
            "Webinar has started";

        return;
    }


    // ==============================
    // COUNTDOWN
    // ==============================

    const days = Math.floor(
        difference / (1000 * 60 * 60 * 24)
    );

    const hours = Math.floor(
        (difference / (1000 * 60 * 60)) % 24
    );

    const minutes = Math.floor(
        (difference / (1000 * 60)) % 60
    );

    const seconds = Math.floor(
        (difference / 1000) % 60
    );

    if (days > 0) {

        countdown.innerHTML =
            `${days}d ${hours}h ${minutes}m ${seconds}s`;

    } else {

        countdown.innerHTML =
            `${hours}h ${minutes}m ${seconds}s`;
    }
}

updateCountdown();

setInterval(updateCountdown, 1000);

function logoutWebinar(){

    localStorage.removeItem("webinarEmail");

    document.getElementById("livePlayer").src="";
    document.getElementById("liveChat").src="";

    document.getElementById("webinarSection").style.display="none";
    document.getElementById("loginSection").style.display="block";

    document.getElementById("email").value="";
    document.getElementById("message").innerHTML="";
}

</script>
