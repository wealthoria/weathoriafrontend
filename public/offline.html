<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — Wealthoria</title>
  <meta name="theme-color" content="#e8473f">
  <link rel="icon" type="image/png" href="assets/logo-mark.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@800&display=swap" rel="stylesheet">
  <style>
    :root { --coral: #e8473f; --ink: #0e0f0c; --body: #454745; --canvas-soft: #e8ebe6; --canvas: #fff; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px;
      font-family: Inter, system-ui, sans-serif; background: var(--canvas-soft); color: var(--ink); }
    .card { max-width: 420px; text-align: center; background: var(--canvas); border-radius: 24px;
      padding: 40px 32px; box-shadow: inset 0 0 0 1px rgba(14,15,12,.08); }
    .mark { width: 60px; height: auto; margin: 0 auto 22px; display: block; }
    h1 { font-family: Manrope, sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -.5px; margin: 0 0 10px; }
    p { font-size: 15px; line-height: 1.55; color: var(--body); margin: 0 0 24px; }
    button { font: inherit; font-weight: 700; border: 0; cursor: pointer; background: linear-gradient(120deg,#e8473f,#f4823c);
      color: #fff; padding: 13px 26px; border-radius: 24px; }
    button:hover { filter: brightness(1.04); }
    .hint { margin-top: 18px; font-size: 12.5px; color: #868685; }
  </style>
</head>
<body>
  <div class="card">
    <img class="mark" src="assets/logo-mark.png" alt="Wealthoria">
    <h1>You're offline</h1>
    <p>Wealthoria can't reach the network right now. Pages you've already opened are still available. Check your connection and try again.</p>
    <button onclick="location.reload()">Try again</button>
    <div class="hint">Learning is the first investment.</div>
  </div>
</body>
</html>
